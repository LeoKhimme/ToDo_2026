<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoMaster</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen">
  <div id="weather-login" class="weather-widget">
    <span id="weather-city-login"></span>
    <span id="weather-temp-login"></span>
    <span id="weather-desc-login"></span>
  </div>

  <div class="login-center">
    <div id="clock-login" class="clock">00:00:00</div>
    <div id="date-login" class="date-display"></div>

    <form id="login-form">
      <input type="text" id="login-input" placeholder="이름을 입력하세요" maxlength="15" autocomplete="off" required>
      <button type="submit" id="login-btn">확인</button>
    </form>
  </div>
</div>

<div id="todo-screen" class="hidden">
  <div id="bg-layer"></div>
  <div class="bg-overlay"></div>
  <button id="logout-btn">로그아웃</button>

  <div id="weather-todo" class="weather-widget">
    <span id="weather-city-todo"></span>
    <span id="weather-temp-todo"></span>
    <span id="weather-desc-todo"></span>
  </div>

  <div class="todo-center">
    <div id="clock-todo" class="clock">00:00:00</div>
    <div id="date-todo" class="date-display"></div>
    <h1 id="greeting"></h1>
  </div>

  <div class="todo-box">
    <p class="todo-section-label">할 일 목록</p>

    <div class="todo-input-row">
      <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요" autocomplete="off" maxlength="80">
      <button id="todo-add-btn">추가</button>
    </div>

    <ul id="todo-list"></ul>
  </div>

  <div id="done-panel">
    <p class="done-panel-title">✓ 완료된 작업</p>
    <ul id="done-list"></ul>
  </div>
</div>

<script src="js/clock.js"></script>
<script src="js/greeting.js"></script>
<script src="js/background.js"></script>
<script src="js/weather.js"></script>
<script src="js/todo.js"></script>

</body>
</html>
